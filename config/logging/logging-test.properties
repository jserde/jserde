# Logging configuration file for JSerde tests

# Root logger
.level = INFO

# Handlers
handlers = java.util.logging.ConsoleHandler

# Console handler
java.util.logging.ConsoleHandler.level = INFO
java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter

# Simple formatter
# https://docs.oracle.com/en/java/javase/17/docs/api/java.logging/java/util/logging/SimpleFormatter.html#format(java.util.logging.LogRecord)
# https://docs.oracle.com/en/java/javase/17/docs/api/java.base/java/util/Formatter.html#syntax
java.util.logging.SimpleFormatter.format = [%4$s] %3$s: %5$s%6$s%n
